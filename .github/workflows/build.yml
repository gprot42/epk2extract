name: Unified Cirrus CLI Pipeline
on:
  workflow_dispatch:
  push:
    branches: [ ci ]
  pull_request:

jobs:
  cirrus-matrix:
    name: ${{ matrix.task_name }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            task_name: "linux_x64"

          - os: macos-26
            task_name: "darwin_aarch64"
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up HTTP Cache (Linux only)
        if: runner.os == 'Linux'
        uses: cirruslabs/http-cache-action@master

      - name: Run Linux Task
        if: runner.os == 'Linux'
        uses: cirruslabs/cirrus-action@master
        with:
          task: ${{ matrix.task_name }}
        env:
          CIRRUS_HTTP_CACHE_HOST: "localhost:12321"

      - name: Install Cirrus & Tart (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cirruslabs/cli/cirrus
          brew install cirruslabs/cli/tart

      - name: Run macOS Task
        if: runner.os == 'macOS'
        run: |
          cirrus run ${{ matrix.task_name }}
